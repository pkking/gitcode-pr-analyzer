name: Frontend Lint

on:
  push:
    branches-ignore:
      - main
      - master
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'scripts/run-frontend-lint.mjs'
      - '.pre-commit-config.yaml'
      - '.github/workflows/frontend-lint.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
