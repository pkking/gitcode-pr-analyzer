name: Collect GitCode CI Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated list of repos (e.g., owner/repo)'
        required: false
      retention_days:
        description: 'Number of days to retain data'
        required: false
        default: '90'

permissions:
  contents: write

concurrency:
  group: collect-gitcode-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run collect
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          TARGET_REPOS: ${{ github.event.inputs.repos }}
          RETENTION_DAYS: ${{ github.event.inputs.retention_days || '90' }}

      - run: |
          git config user.name "action-insight-bot"
          git config user.email "bot@action-insight.local"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: update gitcode $(date -u +%Y-%m-%d)"
          git push
